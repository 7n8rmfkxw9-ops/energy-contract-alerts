name: PR Checklist

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  checklist:
    name: PR checklist
    runs-on: ubuntu-latest
    steps:
      - name: Ensure checklist is complete
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const unchecked = (body.match(/-\s*\[ \]/g) || []).length;
            if (unchecked > 0) {
              core.setFailed(
                `${unchecked} checklist item(s) still unchecked in the PR description. Please complete the checklist before merging.`
              );
            }
